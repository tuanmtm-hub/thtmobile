name: Build iOS App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: |
        npm install

    - name: Build Next.js Static Site
      run: |
        npm run build

    - name: Add and Sync Capacitor iOS
      run: |
        npx cap add ios
        npx cap sync ios

    - name: Upload iOS Xcode Project
      uses: actions/upload-artifact@v4
      with:
        name: tht-center-xcode-project
        path: ios/
